<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Delivery System</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        .details-box { display: none; background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Admin Entry -->
    <div id="admin-panel" style="display:none;" class="card">
        <h3>Add Order</h3>
        <input type="text" id="orderId" placeholder="Order ID">
        <input type="text" id="boyName" placeholder="Delivery Boy Name">
        <input type="text" id="deliveryCode" placeholder="Delivery Code">
        <button onclick="addOrder()">Add Order</button>
    </div>

    <!-- Scanner / Search -->
    <div class="card">
        <h3>Scan or Search Order</h3>
        <div id="reader"></div>
        <input type="text" id="manualSearch" placeholder="Search Order ID..." oninput="fetchOrder(this.value)">
        
        <!-- Order Details Show Hogi -->
        <div id="details" class="details-box">
            <p><strong>ID:</strong> <span id="d-id"></span></p>
            <p><strong>Boy:</strong> <span id="d-name"></span></p>
            <p><strong>Code:</strong> <span id="d-code" style="color:red; font-size:20px; font-weight:bold;"></span></p>
            <button id="recv-btn" onclick="receiveOrder()" style="background:#28a745">Receive Order</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Wahi Config yahan paste karein */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Admin check
        if (new URLSearchParams(window.location.search).get('admin') === 'true') document.getElementById('admin-panel').style.display = 'block';

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('manualSearch').value = text;
            fetchOrder(text);
        });

        let activeOrderId = "";

        function fetchOrder(id) {
            db.ref('orders/' + id).once('value', (snap) => {
                const order = snap.val();
                if(order && order.status === 'Pending') {
                    activeOrderId = id;
                    document.getElementById('details').style.display = 'block';
                    document.getElementById('d-id').innerText = order.id;
                    document.getElementById('d-name').innerText = order.name;
                    document.getElementById('d-code').innerText = order.code;
                } else {
                    document.getElementById('details').style.display = 'none';
                }
            });
        }

        function receiveOrder() {
            db.ref('orders/' + activeOrderId).update({ status: 'Received' });
            alert("Order Received Successfully!");
            location.reload();
        }

        function addOrder() {
            const id = document.getElementById('orderId').value;
            db.ref('orders/' + id).set({ id, name: document.getElementById('boyName').value, code: document.getElementById('deliveryCode').value, status: 'Pending' });
            alert("Added!");
        }
    </script>
</body>
</html>
